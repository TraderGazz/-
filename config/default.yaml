    forex_max_late_bars_m5: 1
  tp:
    tp1_r: 0.9
    tp2_r: 2.0
    use_tp2: true
  lock:
    enabled: true
    scope: "context"
    mode: "symbol+direction"
    ttl_seconds: 14400
    key_prefix: ""
    release_on: ["TP2", "SL", "TIMEOUT"]
  dome:
    context_ttl_seconds: 14400
    invalidate:
      enabled: true
      max_distance_from_crt_pct: 0.6
      break_opposite_boundary: true
      max_keylevel_distance_pct: 0.4
  reentry_enabled: true
  reentry_max_attempts: 1
  reentry_risk_multiplier: 0.5
  reentry_require_reclaim_close: true
  reentry_min_rr_to_tp1: 1.15
  reentry_use_sweep_candle_sl: true
  reentry_sl_buffer_atr_mult: 0.1
  reentry_cooldown_bars: 0
  reentry:
    enabled: true
    require_new_sweep: true
    max_reentries_per_ctx: 1
    min_rr_tp1: 1.15
    cooldown_minutes_after_sl: 0
    sweep_delta_points: 0
    ctx_ttl_minutes: 1440
  paper_sim_enabled: false
  paper_initial_balance: 10000
  paper_base_risk_pct: 0.01
  paper_max_risk_pct: 0.05
  paper_tp1_close_fraction: 0.5
  paper_move_sl_to_be_on_tp1: true
  paper_be_lock_r_mult: 0.1
  paper_intrabar_mode: "M1"
  paper_ohlc_touch_policy: "conservative"
  paper_use_mt5_lots: true
  paper_leverage: 100
  paper_check_margin: false
  paper_rounding_mode: "floor"
  paper_on_lot_too_small: "skip"
  paper_on_margin_insufficient: "reduce"
  paper_out_dir: "out/paper"
  paper_run_name: "EURUSD_YYYYMMDD_HHMMSS"
  resolver:
    max_active_per_direction: 1
    weights:
      status: 10
      keylevel: 5
      recency: 2
      price_distance: 8
      zone_width: 3

risk:
